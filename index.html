<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जगन्नाथ प्रकाशन Publisher</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #fff7e6;
}

header {
  background: #ff8c00;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #ff8c00;
  color: white;
  font-size: 16px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

</style>
</head>

<body>

<header>📚 जगन्नाथ प्रकाशन</header>

<div class="container">

<!-- Excel Import -->
<div class="card">
<h3>📂 Excel (CSV) Import</h3>
<input type="file" id="fileInput" accept=".csv">
</div>

<!-- Form -->
<div class="card">
<h3>📝 Book Form</h3>
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">
<textarea id="description" placeholder="Description"></textarea>
<input id="keywords" placeholder="Keywords">
</div>

<!-- Editor -->
<div class="card">
<h3>🧠 Editor / Notepad</h3>
<textarea id="editor" rows="6"></textarea>
</div>

<!-- Formatter -->
<div class="card">
<h3>⚙️ Formatter</h3>
<button onclick="formatText()">Auto Format</button>
</div>

<!-- Copy Panel -->
<div class="card">
<h3>📋 Copy Panel</h3>
<button onclick="copyText(title.value)">Copy Title</button>
<button onclick="copyText(description.value)">Copy Description</button>
<button onclick="copyText(keywords.value)">Copy Keywords</button>
<button onclick="copyAll()">Copy All</button>
</div>

<!-- Links -->
<div class="card">
<h3>🌐 Tools</h3>
<button onclick="openLink('https://kdp.amazon.com')">Open KDP</button>
<button onclick="openLink('https://docs.google.com')">Google Docs</button>
<button onclick="openLink('https://drive.google.com')">Google Drive</button>
</div>

</div>

<script>

// CSV Import
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    const lines = event.target.result.split("\n");
    const data = lines[1].split(",");

    document.getElementById("title").value = data[0] || "";
    document.getElementById("author").value = data[1] || "";
    document.getElementById("description").value = data[2] || "";
    document.getElementById("keywords").value = data[3] || "";
  };

  reader.readAsText(file);
});

// Formatter
function formatText() {
  let text = document.getElementById("description").value;
  text = "📖 " + text + "\n\n👉 यह पुस्तक आपके लिए उपयोगी है।";
  document.getElementById("description").value = text;
  alert("Formatted!");
}

// Copy
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    alert("Copied!");
  } catch {
    alert("Permission denied!");
  }
}

// Copy All
function copyAll() {
  const all = `
Title: ${title.value}
Author: ${author.value}
Description: ${description.value}
Keywords: ${keywords.value}
`;
  copyText(all);
}

// Open Links
function openLink(url) {
  window.open(url, "_blank");
}

</script>

</body>
  </html>
