<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GBS Publications - AI Writer & KDP Tool</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
/* ===== PRINT / PDF MODE ===== */

@media print {

body{
background:white !important;
padding:0;
margin:0;
}

.header,
button,
input,
select,
#searchInput,
#coverInput,
.small-btn,
.card h3,
table,
.grid,
.preview{
display:none !important;
}

.card{
box-shadow:none !important;
border:none !important;
padding:0 !important;
margin:0 !important;
background:white !important;
}

#editor{
display:block !important;
width:100% !important;
height:auto !important;
border:none !important;
font-size:18px !important;
line-height:1.8 !important;
padding:20px !important;
white-space:pre-wrap !important;
}

textarea{
overflow:visible !important;
}

@page{
size:A4;
margin:20mm;
}

}
}
body{
background:#f5f1e6;
padding:10px;
}

.header{
background:linear-gradient(180deg,#ff8c00,#e65c00);
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
margin-bottom:12px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h3{
margin-bottom:10px;
color:#d35400;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

textarea{
min-height:140px;
resize:vertical;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:8px;
background:#ff8c00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e67300;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th{
background:#e65c00;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:10px;
border:1px solid #ddd;
font-size:13px;
text-align:center;
}

.cover-img{
width:60px;
height:90px;
object-fit:cover;
border-radius:4px;
}

.small-btn{
padding:8px;
font-size:12px;
margin:2px;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
max-height:250px;
object-fit:cover;
}

.api-section{
background:#fff3e0;
padding:12px;
border-radius:8px;
margin-bottom:15px;
border-left:4px solid #ff8c00;
}

.api-section p{
color:#d35400;
font-size:13px;
margin-bottom:8px;
font-weight:bold;
}

#apiKeyInput{
background:#fff;
border:2px solid #ff8c00;
}

.api-status{
font-size:12px;
padding:8px;
border-radius:5px;
margin-top:8px;
text-align:center;
}

.api-status.valid{
background:#c8e6c9;
color:#2e7d32;
}

.api-status.invalid{
background:#ffcdd2;
color:#c62828;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="header">
📚 GBS Publications - AI Writer & KDP Tool
</div>

<div class="card">

<div class="api-section">
<p>🔐 OpenAI API Key Setting</p>
<input
type="password"
id="apiKeyInput"
placeholder="Enter your OpenAI API Key (sk-...)"
onchange="validateApiKey()"
>
<div id="apiStatus" class="api-status invalid">❌ API Key not set</div>
</div>

<h3>🧠 AI Publishing Tools</h3>

<button onclick="generateMetadata()">
📘 Generate Metadata
</button>

<button onclick="generateTOC()">
📚 Generate TOC
</button>

<button onclick="generateBackCover()">
📝 Back Cover
</button>

<button onclick="generateAuthorBio()">
👤 Author Bio
</button>

<button onclick="generateKDPData()">
🚀 KDP Ready Data
</button>

</div>

<div class="card">

<h3>🔍 Search Books</h3>

<input
type="text"
id="searchInput"
placeholder="Search by title"
onkeyup="renderBooks()"
>

</div>

<div class="card">

<h3>📘 Book Form</h3>

<input
type="text"
id="title"
placeholder="Book Title"
>

<input
type="text"
id="author"
placeholder="Author Name"
>

<select id="status">
<option>Draft</option>
<option>Ready</option>
<option>Published</option>
</select>

<select id="category">
<option>Spiritual</option>
<option>Research</option>
<option>Education</option>
<option>History</option>
<option>AI</option>
</select>

<textarea
id="description"
placeholder="Book Description"
></textarea>

<input
type="text"
id="keywords"
placeholder="Keywords"
>

<h3>🖼 Cover Upload</h3>

<input
type="file"
id="coverInput"
accept="image/*"
onchange="previewCover(event)"
>

<img
id="coverPreview"
class="preview"
style="display:none;"
>

<h3>🧠 AI Manuscript Editor</h3>

<textarea
id="editor"
placeholder="Write or paste manuscript here"
></textarea>

<div class="grid">

<button onclick="aiGenerate()">
🤖 AI Generate
</button>

<button onclick="formatText()">
✨ Format Text
</button>

<button onclick="saveBook()">
💾 Save Book
</button>

<button onclick="copyKDP()">
📋 Copy KDP
</button>

</div>

</div>

<div class="card">

<h3>📤 Export Tools</h3>

<button onclick="downloadTXT()">
📄 Download TXT
</button>

<button onclick="downloadHTML()">
🌐 Download HTML
</button>

<button onclick="printBook()">
🖨 Print / PDF
</button>

</div>

<div class="card">

<h3>📚 Dashboard</h3>

<table>

<thead>

<tr>
<th>Cover</th>
<th>Title</th>
<th>Status</th>
<th>Category</th>
<th>Action</th>
</tr>

</thead>

<tbody id="bookTable">

</tbody>

</table>

</div>

<script>

let books =
JSON.parse(localStorage.getItem("books"))
|| [];

let currentCover = "";

function validateApiKey(){
const apiKey = document.getElementById("apiKeyInput").value;
const statusDiv = document.getElementById("apiStatus");

if(!apiKey){
statusDiv.className = "api-status invalid";
statusDiv.textContent = "❌ API Key not set";
localStorage.removeItem("openaiApiKey");
return false;
}

if(!apiKey.startsWith("sk-")){
statusDiv.className = "api-status invalid";
statusDiv.textContent = "❌ Invalid API Key format (must start with sk-)";
localStorage.removeItem("openaiApiKey");
return false;
}

statusDiv.className = "api-status valid";
statusDiv.textContent = "✅ API Key is set and ready";
localStorage.setItem("openaiApiKey", apiKey);
return true;
}

// Load API key from localStorage on page load
window.addEventListener("DOMContentLoaded", function(){
const savedApiKey = localStorage.getItem("openaiApiKey");
if(savedApiKey){
document.getElementById("apiKeyInput").value = savedApiKey;
validateApiKey();
}
});

function previewCover(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

currentCover = e.target.result;

const img =
document.getElementById("coverPreview");

img.src = currentCover;

img.style.display = "block";

}

reader.readAsDataURL(file);

}

function aiGenerate(){

const desc =
document.getElementById("description").value;

const title =
document.getElementById("title").value;

const editor =
document.getElementById("editor");

editor.value =
`
📖 ${title}

${desc}

यह पुस्तक विषय को गहराई से समझाने हेतु तैयार की गई है।

इसमें व्यावहारिक, दार्शनिक और विश्लेषणात्मक दृष्टिकोण शामिल हैं।

अध्याय 1 : परिचय

अध्याय 2 : मूल सिद्धांत

अध्याय 3 : गहन विश्लेषण

अध्याय 4 : आधुनिक संदर्भ

अध्याय 5 : निष्कर्ष
`;

}

function formatText(){

let text =
document.getElementById("editor").value;

text =
text.replace(/\n{3,}/g,"\n\n");

document.getElementById("editor").value =
text;

}

function saveBook(){

const book = {

title:
document.getElementById("title").value,

author:
document.getElementById("author").value,

status:
document.getElementById("status").value,

category:
document.getElementById("category").value,

description:
document.getElementById("description").value,

keywords:
document.getElementById("keywords").value,

content:
document.getElementById("editor").value,

cover:
currentCover

};

books.push(book);

localStorage.setItem(
"books",
JSON.stringify(books)
);

renderBooks();

alert("Book Saved Successfully");

}

function renderBooks(){

const search =
document.getElementById("searchInput")
.value.toLowerCase();

let html = "";

books.forEach((b,i)=>{

if(
!b.title.toLowerCase().includes(search)
) return;

html += `

<tr>

<td>

${b.cover
?
`<img src="${b.cover}" class="cover-img">`
:
"📕"
}

</td>

<td>${b.title}</td>

<td>${b.status}</td>

<td>${b.category}</td>

<td>

<button
class="small-btn"
onclick="editBook(${i})">
Edit
</button>

<button
class="small-btn"
onclick="deleteBook(${i})">
Delete
</button>

<button
class="small-btn"
onclick="copyBook(${i})">
Copy
</button>

</td>

</tr>

`;

});

document.getElementById("bookTable")
.innerHTML = html;

}

function editBook(i){

const b = books[i];

document.getElementById("title").value =
b.title;

document.getElementById("author").value =
b.author;

document.getElementById("status").value =
b.status;

document.getElementById("category").value =
b.category;

document.getElementById("description").value =
b.description;

document.getElementById("keywords").value =
b.keywords;

document.getElementById("editor").value =
b.content;

if(b.cover){

currentCover = b.cover;

const img =
document.getElementById("coverPreview");

img.src = b.cover;

img.style.display = "block";

}

}

function deleteBook(i){

if(confirm("Delete this book?")){

books.splice(i,1);

localStorage.setItem(
"books",
JSON.stringify(books)
);

renderBooks();

}

}

function copyBook(i){

const b = books[i];

navigator.clipboard.writeText(
`
TITLE:
${b.title}

AUTHOR:
${b.author}

DESCRIPTION:
${b.description}

KEYWORDS:
${b.keywords}

CONTENT:
${b.content}
`
);

alert("Copied");

}

function copyKDP(){

const data =
`
TITLE:
${document.getElementById("title").value}

AUTHOR:
${document.getElementById("author").value}

DESCRIPTION:
${document.getElementById("description").value}

KEYWORDS:
${document.getElementById("keywords").value}

CONTENT:
${document.getElementById("editor").value}
`;

navigator.clipboard.writeText(data);

alert("KDP Data Copied");

}

function generateMetadata(){

const title =
document.getElementById("title").value;

document.getElementById("keywords").value =
title
.split(" ")
.join(",");

alert("Metadata Generated");

}

function generateTOC(){

const editor =
document.getElementById("editor");

editor.value +=

`

📚 TABLE OF CONTENTS

1. Introduction
2. Main Concepts
3. Deep Analysis
4. Modern Context
5. Conclusion

`;

}

function generateBackCover(){

const desc =
document.getElementById("description");

desc.value +=

`

यह पुस्तक पाठकों को विषय की गहराई तक ले जाती है और आधुनिक दृष्टिकोण प्रदान [...]

`;

}

function generateAuthorBio(){

const author =
document.getElementById("author").value;

document.getElementById("editor").value +=

`

👤 AUTHOR BIO

${author} एक शोधकर्ता, लेखक और विचारक हैं।

`;

}

function generateKDPData(){

alert("KDP Ready Data Generated");

copyKDP();

}

function downloadTXT(){

const content =
document.getElementById("editor").value;

const blob = new Blob(
[content],
{type:"text/plain"}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download = "book.txt";

a.click();

}

function downloadHTML(){

const content = `
<html>
<body>
<pre>
${document.getElementById("editor").value}
</pre>
</body>
</html>
`;

const blob = new Blob(
[content],
{type:"text/html"}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download = "book.html";

a.click();

}

function printBook(){

window.print();

}

renderBooks();

</script>

</body>
  </html>
