<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जगन्नाथ प्रकाशन</title>

<style>
body { font-family: sans-serif; margin:0; background:#fff7e6;}
header { background:#ff8c00; color:#fff; padding:15px; text-align:center;}
.container { padding:10px;}
.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:10px;}
button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; background:#ff8c00; color:#fff;}
input, textarea, select { width:100%; padding:8px; margin:5px 0;}
table { width:100%; border-collapse: collapse;}
th, td { border:1px solid #ccc; padding:6px; text-align:center;}
</style>
</head>

<body>

<header>📚 जगन्नाथ प्रकाशन</header>

<div class="container">

<!-- Book Form -->
<div class="card">
<h3>📘 Book Form</h3>

<input id="jp" placeholder="JP Number">
<input id="title" placeholder="Title">
<input id="author" placeholder="Author">

<select id="status">
<option>Draft</option>
<option>Ready</option>
<option>Published</option>
</select>

<textarea id="description" placeholder="Description"></textarea>
<input id="keywords" placeholder="Keywords">
</div>

<!-- Editor -->
<div class="card">
<h3>🧠 पांडुलिपि Editor</h3>
<textarea id="editor" rows="8" placeholder="यहाँ टेक्स्ट paste करें"></textarea>
</div>

<!-- Actions -->
<div class="card">
<h3>⚙️ Actions</h3>

<button onclick="formatText()">Auto Format</button>
<button onclick="runAI()">🤖 AI Generate</button>
<button onclick="copyAll()">📋 Copy All</button>

</div>

<!-- Dashboard -->
<div class="card">
<h3>📚 Book Dashboard</h3>

<table>
<thead>
<tr>
<th>JP</th>
<th>Title</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="bookTable"></tbody>
</table>

<button onclick="saveBook()">➕ Add / Save Book</button>

</div>

</div>

<script>

// DATA
let books = JSON.parse(localStorage.getItem("books")) || [];

// SAVE
function saveBook() {
  const book = {
    jp: jp.value,
    title: title.value,
    author: author.value,
    status: status.value,
    description: description.value,
    keywords: keywords.value,
    content: editor.value
  };

  books.push(book);
  localStorage.setItem("books", JSON.stringify(books));
  renderTable();
}

// RENDER
function renderTable() {
  let html = "";

  books.forEach((b, i) => {
    html += `
    <tr>
      <td>${b.jp}</td>
      <td>${b.title}</td>
      <td>${b.status}</td>
      <td>
        <button onclick="editBook(${i})">Edit</button>
        <button onclick="copyBook(${i})">Copy</button>
        <button onclick="deleteBook(${i})">Delete</button>
      </td>
    </tr>`;
  });

  document.getElementById("bookTable").innerHTML = html;
}

// EDIT
function editBook(i) {
  const b = books[i];

  jp.value = b.jp;
  title.value = b.title;
  author.value = b.author;
  status.value = b.status;
  description.value = b.description;
  keywords.value = b.keywords;
  editor.value = b.content;
}

// DELETE
function deleteBook(i) {
  books.splice(i, 1);
  localStorage.setItem("books", JSON.stringify(books));
  renderTable();
}

// COPY SINGLE
function copyBook(i) {
  const b = books[i];
  navigator.clipboard.writeText(
`JP: ${b.jp}
Title: ${b.title}
Description: ${b.description}
Keywords: ${b.keywords}`
  );
  alert("Copied!");
}

// COPY ALL
function copyAll() {
  navigator.clipboard.writeText(editor.value);
  alert("Copied!");
}

// FORMAT
function formatText() {
  let text = editor.value;
  text = text.replace(/\s+/g, " ");
  text = text.replace(/\.\s/g, ".\n\n");
  editor.value = text;
}

// AI GENERATE
function runAI() {

  let desc = description.value;

  if (!desc) {
    alert("पहले description डालें");
    return;
  }

  let titleAI = desc.split(" ").slice(0, 6).join(" ");
  let keywordsAI = [...new Set(desc.split(" "))].slice(0, 10).join(", ");

  let content = `
📘 ${titleAI}

📖 विवरण:
${desc.substring(0,120)}

🔑 Keywords:
${keywordsAI}

📝 सामग्री:
${desc}

👉 यह पुस्तक उपयोगी ज्ञान प्रदान करती है।
`;

  title.value = titleAI;
  keywords.value = keywordsAI;
  editor.value = content;
}

// INIT
renderTable();

</script>

</body>
</html>
