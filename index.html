<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GBS Publications - AI Writer</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f6eedc;
}

.header{
background:linear-gradient(#ff8c00,#d35400);
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.container{
padding:10px;
}

.card{
background:white;
padding:12px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h3{
margin-top:0;
color:#d35400;
}

input,textarea,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:15px;
}

textarea{
min-height:180px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:8px;
background:#ff8c00;
color:white;
font-weight:bold;
font-size:15px;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#d35400;
color:white;
}

.cover-preview{
width:100%;
max-height:260px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
border:1px solid #ccc;
}

.badge{
padding:5px 8px;
border-radius:6px;
color:white;
font-size:12px;
}

.draft{
background:#e67e22;
}

.ready{
background:#27ae60;
}

.published{
background:#c0392b;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

table{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="header">
📚 GBS Publications - AI Writer & KDP Tool
</div>

<div class="container">
<div class="card">

<h3>🧠 AI Publishing Tools</h3>

<button onclick="generateMetadata()">
📘 Generate Metadata
</button>

<button onclick="generateTOC()">
📚 Generate TOC
</button>

<button onclick="generateBackCover()">
📝 Back Cover
</button>

<button onclick="generateAuthorBio()">
👤 Author Bio
</button>

<button onclick="generateKDPData()">
🚀 KDP Ready Data
</button>

</div>
<div class="card">

<h3>🔍 Search Books</h3>

<input 
id="searchInput" 
placeholder="Search by title"
onkeyup="searchBooks()"
>

</div>

<div class="card">

<h3>📘 Book Form</h3>

<input 
id="title" 
placeholder="Book Title"
>

<input 
id="author" 
placeholder="Author Name"
>

<select id="status">
<option>Draft</option>
<option>Ready</option>
<option>Published</option>
</select>

<select id="category">
<option>Research</option>
<option>Spiritual</option>
<option>Education</option>
<option>AI</option>
<option>GBSB4U</option>
</select>

<textarea
id="description"
placeholder="Book Description"
></textarea>

<input
id="keywords"
placeholder="Keywords"
>

<h3>🖼 Cover Upload</h3>

<input
type="file"
id="coverInput"
accept="image/*"
>

<img
id="coverPreview"
class="cover-preview"
style="display:none;"
>

<h3>🧠 AI Manuscript Editor</h3>

<textarea
id="editor"
placeholder="Write or paste manuscript here"
></textarea>

<div class="grid">

<button onclick="runAI()">
🤖 AI Generate
</button>

<button onclick="formatText()">
✨ Format Text
</button>

<button onclick="saveBook()">
💾 Save Book
</button>

<button onclick="copyKDP()">
📤 Copy KDP
</button>

</div>

</div>

<div class="card">

<h3>📚 Dashboard</h3>

<table>

<thead>

<tr>

<th>Cover</th>
<th>Title</th>
<th>Status</th>
<th>Category</th>
<th>Action</th>

</tr>

</thead>

<tbody id="bookTable"></tbody>

</table>

</div>

</div>

<script>

let books =
JSON.parse(localStorage.getItem("books"))
|| [];

let editIndex = -1;

// SAVE LOCAL
function saveLocal(){

localStorage.setItem(
"books",
JSON.stringify(books)
);

}

// COVER PREVIEW
coverInput.addEventListener(
"change",
function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

coverPreview.src =
event.target.result;

coverPreview.style.display =
"block";

}

reader.readAsDataURL(file);

}
);

// SMART AI
function runAI(){

let desc =
description.value.trim();

if(!desc){

alert("पहले description डालें");

return;

}

let words =
desc.split(" ");

let aiTitle =
words.slice(0,8).join(" ");

let kw =
[...new Set(words)]

.filter(w => w.length > 3)

.slice(0,12)

.join(", ");

let chapters = `

1. प्रस्तावना
2. विषय परिचय
3. मुख्य विश्लेषण
4. उदाहरण
5. निष्कर्ष

`;

let manuscript = `

📘 ${aiTitle}

✍️ लेखक:
${author.value}

📖 पुस्तक विवरण:
${desc}

🔑 Keywords:
${kw}

📚 अध्याय संरचना:
${chapters}

📝 AI Draft Manuscript:

${desc}

यह पुस्तक विषय को गहराई से समझाने हेतु तैयार की गई है।

इसमें व्यावहारिक, दार्शनिक और विश्लेषणात्मक दृष्टिकोण शामिल हैं।

© Jagannath Publishing

`;

title.value = aiTitle;

keywords.value = kw;

editor.value = manuscript;

}

// FORMATTER
function formatText(){

let text = editor.value;

text =
text.replace(/\s+/g," ");

text =
text.replace(/\. /g,".\n\n");

editor.value = text;

}

// SAVE BOOK
function saveBook(){

const book = {

title:title.value,

author:author.value,

status:status.value,

category:category.value,

description:description.value,

keywords:keywords.value,

content:editor.value,

cover:coverPreview.src || ""

};

if(editIndex === -1){

books.push(book);

}else{

books[editIndex] = book;

editIndex = -1;

}

saveLocal();

renderBooks();

clearForm();

alert("Book Saved!");

}

// RENDER
function renderBooks(list = books){

let html = "";

list.forEach((b,i)=>{

let badgeClass = "draft";

if(b.status === "Ready")
badgeClass = "ready";

if(b.status === "Published")
badgeClass = "published";

html += `

<tr>

<td>

${b.cover
? `<img src="${b.cover}" width="60">`
: "📕"}

</td>

<td>${b.title}</td>

<td>

<span class="badge ${badgeClass}">
${b.status}
</span>

</td>

<td>${b.category}</td>

<td>

<button onclick="editBook(${i})">
Edit
</button>

<button onclick="deleteBook(${i})">
Delete
</button>

<button onclick="copySingle(${i})">
Copy
</button>

</td>

</tr>

`;

});

document.getElementById(
"bookTable"
).innerHTML = html;

}

// EDIT
function editBook(i){

let b = books[i];

title.value = b.title;

author.value = b.author;

status.value = b.status;

category.value = b.category;

description.value = b.description;

keywords.value = b.keywords;

editor.value = b.content;

if(b.cover){

coverPreview.src = b.cover;

coverPreview.style.display =
"block";

}

editIndex = i;

}

// DELETE
function deleteBook(i){

if(confirm("Delete this book?")){

books.splice(i,1);

saveLocal();

renderBooks();

}

}

// COPY SINGLE
function copySingle(i){

navigator.clipboard.writeText(
books[i].content
);

alert("Copied!");

}

// COPY KDP
function copyKDP(){

let txt = `

Title:
${title.value}

Author:
${author.value}

Description:
${description.value}

Keywords:
${keywords.value}

Content:
${editor.value}

`;

navigator.clipboard.writeText(txt);

alert("KDP Ready Data Copied!");

}

// SEARCH
function searchBooks(){

let q =
searchInput.value.toLowerCase();

let filtered =
books.filter(b =>

b.title.toLowerCase()
.includes(q)

);

renderBooks(filtered);

}

// CLEAR FORM
function clearForm(){

title.value = "";

author.value = "";

description.value = "";

keywords.value = "";

editor.value = "";

coverPreview.src = "";

coverPreview.style.display =
"none";

}

// INIT
renderBooks();

</script>

</body>
  </html>
